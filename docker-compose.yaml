name: roboshop
services:
  mongodb:
    build: ./mongodb
    image: sumanthswarna/mongodb:v1
    container_name: mongodb

  catalogue:
    build: ./catalogue
    image: sumanthswarna/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    image: sumanthswarna/frontend:v2
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payment

  user:
    build: ./user
    image: sumanthswarna/user:v1
    container_name: user
    environment:
       MONGO: true
       REDIS_URL: 'redis://redis:6379'
       MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
      - redis
      - mongodb

  cart:
    build: ./cart
    image: sumanthswarna/cart:v1
    environment:
      REDIS_HOST: redis
      CATALOGUE_HOST: catalogue
      CATALOGUE_PORT: 8080

    depends_on:
      - redis
      - catalogue

  shipping:
    build: ./shipping
    image: sumanthswarna/shipping:v1
    container_name: shipping
    environment:
      CART_ENDPOINT: "cart:8080"
      DB_HOST: mysql
    depends_on:
      - cart
      - mysql

  payment:
    build: ./payment
    image: sumanthswarna/payment:v1
    container_name: payment
    environment:
        CART_HOST: "cart"
        CART_PORT: 8080
        USER_HOST: user
        USER_PORT: 8080
        AMQP_HOST: rabbitmq
        AMQP_USER: roboshop
        AMQP_PASS: roboshop123
    depends_on:
      - cart
      - user
      - rabbitmq
  redis:
   image: redis:7
   container_name: redis

  mysql:
   image: sumanthswarna/mysql:v2
   build: ./mysql
   container_name: mysql
   command:  --mysql-native-password=ON --innodb-lock_wait_timeout=120
   environment:
     MYSQL_ROOT_PASSWORD: "RoboShop@1"

  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
networks:
  default: 
    name: roboshop
    driver: bridge
    external: false 
  

    


  
